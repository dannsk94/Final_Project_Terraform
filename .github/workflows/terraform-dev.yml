name: Terraform Dev

on:
  push:
    branches: [main]
    paths: ['envs/dev/**', 'modules/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_ROOT: envs/dev
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  validate:
    name: Validate
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Copy image ID (if exists)
        run: |
          if [ -f modules/compute/image.auto.tfvars ]; then
            cp modules/compute/image.auto.tfvars envs/dev/
            echo "Image ID copied"
          else
            echo "Using default image"
          fi
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

  plan:
    name: Plan
    if: github.event_name != 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_my_ip: ${{ secrets.MY_IP }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - name: Copy image ID (if exists)
        run: |
          if [ -f modules/compute/image.auto.tfvars ]; then
            cp modules/compute/image.auto.tfvars envs/dev/
            echo "Image ID copied"
          else
            echo "Using default image"
          fi
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform plan -var-file=dev.tfvars
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_my_ip: ${{ secrets.MY_IP }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

  apply:
    name: Apply
    if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: plan
    environment: dev
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_my_ip: ${{ secrets.MY_IP }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - name: Copy image ID (if exists)
        run: |
          if [ -f modules/compute/image.auto.tfvars ]; then
            cp modules/compute/image.auto.tfvars envs/dev/
            echo "Image ID copied"
          else
            echo "Using default image"
          fi
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform apply -auto-approve -var-file=dev.tfvars
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_my_ip: ${{ secrets.MY_IP }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    
      - name: Install OpenStack CLI
        run: pip install python-openstackclient

      - name: Health Check & Repair Floating IPs
        if: success()
        working-directory: ${{ env.TF_ROOT }}
        run: | 
          chmod +x ../../scripts/*.sh
          ../../scripts/health-check-dev.sh
        env:
          OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
          OS_USERNAME: ${{ secrets.OS_USERNAME }}
          OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
          OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
          OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}


  destroy:
    name: Destroy Dev
    if: github.event_name == 'workflow_dispatch'
    environment: dev
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
      TF_VAR_my_ip: ${{ secrets.MY_IP }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - name: Copy image ID (if exists)
        run: |
          if [ -f modules/compute/image.auto.tfvars ]; then
            cp modules/compute/image.auto.tfvars envs/dev/
            echo "Image ID copied"
          else
            echo "Using default image"
          fi
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform destroy -auto-approve -var-file=dev.tfvars
        working-directory: ${{ env.TF_ROOT }}
        env:
          TF_VAR_my_ip: ${{ secrets.MY_IP }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}