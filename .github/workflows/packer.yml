name: Packer Build

on:
  workflow_dispatch:

jobs:
  packer:
    name: Packer Build
    runs-on: ubuntu-latest
    env:
      PACKER_GITHUB_API_TOKEN: ${{ secrets.PACKER_GITHUB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3
      - name: Create clouds.yaml
        run: |
          cat > packer/clouds.yaml << 'EOF'
          ${{ secrets.CLOUDS_YAML }}
          EOF
      - name: Packer Init
        run: |
          cd packer
          packer init lab-packer-config.pkr.hcl
      - name: Packer Build and Get Image ID
        run: |
          cd packer
          OS_CLOUD=vkcs packer build lab-packer-config.pkr.hcl 2>&1 | tee build.log
          IMAGE_ID=$(grep -oP 'An image was created: \K[0-9a-f-]+' build.log)
          echo "image_id = \"$IMAGE_ID\"" > ../modules/compute/image.auto.tfvars
          echo "Image ID: $IMAGE_ID"
      - name: Commit and Push image ID
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add modules/compute/image.auto.tfvars
          git diff --staged --quiet || git commit -m "Update image ID [skip ci]"
          git push